version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: kw-studio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kw_studio}
      POSTGRES_USER: ${POSTGRES_USER:-kw_studio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kw_studio}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: python:3.12-slim
    container_name: kw-studio-backend
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             uvicorn backend.app.main:app --host 0.0.0.0 --port 8000"
    env_file:
      - .env.example
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  frontend:
    image: node:20-alpine
    container_name: kw-studio-frontend
    working_dir: /app
    command: >
      sh -c "if [ -f frontend/package.json ]; then npm install && npm run dev -- --hostname 0.0.0.0 --port 3000;
             else echo 'Frontend scaffold not created yet'; tail -f /dev/null; fi"
    env_file:
      - .env.example
    volumes:
      - ./:/app
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
