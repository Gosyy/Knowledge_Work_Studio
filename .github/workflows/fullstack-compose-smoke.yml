name: Full-stack compose smoke

on:
  workflow_dispatch:
    inputs:
      timeout_seconds:
        description: Compose startup timeout in seconds
        required: false
        default: "180"
      run_real_smoke:
        description: Run the real Docker Compose smoke after check-only
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

jobs:
  fullstack-compose-smoke:
    name: Full-stack Docker Compose smoke
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run check-only compose smoke validation
        run: python scripts/kw_fullstack_compose_smoke.py --repo-root . --check-only

      - name: Run real full-stack compose smoke
        if: ${{ inputs.run_real_smoke == 'true' }}
        run: python scripts/kw_fullstack_compose_smoke.py --repo-root . --timeout ${{ inputs.timeout_seconds }}
